name: sevasetu
description: SevaSetu - AI-powered NGO volunteer coordination platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  go_router: ^12.1.3
  flutter_animate: ^4.3.0
  google_maps_flutter: ^2.5.3
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  firebase_messaging: ^14.7.9
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  speech_to_text: ^6.6.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  google_fonts: ^6.1.0
  lucide_icons: ^0.0.3
  intl: ^0.18.1
  percent_indicator: ^4.2.3
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.7
  riverpod_generator: ^2.3.9
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
